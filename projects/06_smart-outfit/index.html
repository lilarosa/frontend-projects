<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Outfit Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="phone-shell">
    <header class="app-bar">
      <a href="../../index.html" aria-label="Back to frontend projects">Projects</a>
      <div>
        <p>Flutter concept showcase</p>
        <h1>Smart Outfit</h1>
      </div>
    </header>

    <main class="app-screen">
      <section class="view active" id="clothesView" aria-labelledby="clothesTitle">
        <div class="view-heading">
          <div>
            <p class="eyebrow">My wardrobe</p>
            <h2 id="clothesTitle">My Clothes</h2>
          </div>
          <button id="reloadBtn" class="ghost-button" type="button">Reload Clothes</button>
        </div>

        <form id="clothingForm" class="form-card">
          <input id="itemId" type="hidden">
          <label>
            Name
            <input id="itemName" type="text" placeholder="e.g. Cream trench coat" required>
          </label>
          <label>
            Image URL
            <input id="itemImageUrl" type="url" placeholder="https://example.com/photo.jpg">
          </label>

          <div class="upload-row">
            <label class="file-picker">
              Pick Image
              <input id="itemImageFile" type="file" accept="image/*">
            </label>
            <button id="uploadBtn" class="secondary-button" type="button">Upload Image</button>
          </div>
          <p id="selectedFileName" class="helper-text">No local image selected.</p>

          <label>
            Color
            <input id="itemColor" type="text" placeholder="cream, black, blue..." required>
          </label>

          <div class="field-grid">
            <label>
              Category
              <select id="itemCategory">
                <option value="top">top</option>
                <option value="bottom">bottom</option>
                <option value="outerwear">outerwear</option>
                <option value="dress">dress</option>
                <option value="shoes">shoes</option>
              </select>
            </label>
            <label>
              Season
              <select id="itemSeason">
                <option value="spring">spring</option>
                <option value="summer">summer</option>
                <option value="autumn">autumn</option>
                <option value="winter">winter</option>
              </select>
            </label>
            <label>
              Occasion
              <select id="itemOccasion">
                <option value="work">work</option>
                <option value="casual">casual</option>
                <option value="party">party</option>
              </select>
            </label>
          </div>

          <button id="saveBtn" class="primary-button" type="submit">Add Clothing Item</button>
          <button id="cancelEditBtn" class="ghost-button hidden" type="button">Cancel Editing</button>
        </form>

        <div id="clothesList" class="clothes-list" aria-live="polite"></div>
      </section>

      <section class="view" id="recommendView" aria-labelledby="recommendTitle">
        <div class="view-heading">
          <div>
            <p class="eyebrow">Outfit engine</p>
            <h2 id="recommendTitle">Recommendation</h2>
          </div>
          <span id="itemCountBadge" class="count-badge">0 items</span>
        </div>

        <form id="recommendForm" class="form-card compact-form">
          <label>
            Occasion
            <select id="recommendOccasion">
              <option value="work">work</option>
              <option value="casual">casual</option>
              <option value="party">party</option>
            </select>
          </label>
          <label>
            Season
            <select id="recommendSeason">
              <option value="spring">spring</option>
              <option value="summer">summer</option>
              <option value="autumn">autumn</option>
              <option value="winter">winter</option>
            </select>
          </label>
          <label>
            Temperature
            <input id="recommendTemperature" type="number" value="12" min="-20" max="45" required>
          </label>
          <button class="primary-button" type="submit">Get Recommendation</button>
        </form>

        <div id="recommendationResult" class="recommendation-result" aria-live="polite"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Smart Outfit views">
      <button class="nav-button active" type="button" data-view="clothesView">
        <span>▣</span>
        Clothes
      </button>
      <button class="nav-button" type="button" data-view="recommendView">
        <span>✦</span>
        Recommend
      </button>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
